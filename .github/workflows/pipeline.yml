name: Calgary Housing Intelligence Pipeline

on:
  schedule:
    # 9am UTC on the 1st and 15th of each month (~biweekly)
    - cron: '0 9 1 * *'
    - cron: '0 9 15 * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to push updated data + reports back

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Data refresh + model retrain + news + report
  # ─────────────────────────────────────────────────────────────
  data-and-models:
    name: Scrape · Models · News · Report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Data scraping ──────────────────────────────────────────
      - name: Scrape oil prices (yfinance)
        run: python src/scrape_oil.py

      - name: Scrape Bank of Canada rates
        run: python src/scrape_interest_rates.py

      - name: Scrape economic indicators
        run: python src/scrape_economic.py

      - name: Scrape daily indicators
        run: python src/scrape_daily_indicators.py

      - name: Scrape CREB monthly PDF
        run: python src/scrape_creb.py

      - name: Merge all datasets
        run: python src/merge_datasets.py

      # ── Model retraining ────────────────────────────────────────
      - name: Train annual XGBoost model
        run: python src/model_xgboost.py

      - name: Train monthly XGBoost model
        run: python src/model_monthly.py

      - name: Train daily pressure score model
        run: python src/model_daily.py

      # ── Intelligence layer ──────────────────────────────────────
      - name: Scrape news (RSS feeds)
        run: python src/scrape_news.py

      - name: Generate market intelligence report
        run: python src/generate_report.py

      # ── Commit results back to repo ─────────────────────────────
      - name: Commit and push updated data + report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/processed/ reports/ notebooks/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Automated pipeline run $(date +%Y-%m-%d)

          - Updated oil/economic/CREB data
          - Retrained XGBoost models (annual, monthly, daily)
          - Scraped latest news (CBC, OilPrice, Better Dwelling)
          - Generated market intelligence report

          [skip ci]"
          git push origin master

  # ─────────────────────────────────────────────────────────────
  # Job 2: MiroFish geopolitical simulation
  # Requires QWEN_API_KEY and ZEP_API_KEY secrets in repo settings
  # ─────────────────────────────────────────────────────────────
  mirofish-simulation:
    name: MiroFish Geopolitical Simulation
    runs-on: ubuntu-latest
    needs: data-and-models
    timeout-minutes: 180   # simulation can take up to 3 hours
    # Only run if secrets are configured
    if: ${{ secrets.QWEN_API_KEY != '' && secrets.ZEP_API_KEY != '' }}

    steps:
      - name: Checkout Calgary-Housing
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pull the latest report just committed by job 1
          ref: master

      - name: Checkout MiroFish
        uses: actions/checkout@v4
        with:
          repository: dingjamma/MiroFish
          token: ${{ secrets.GITHUB_TOKEN }}
          path: MiroFish

      - name: Set up Python 3.11 (camel-oasis compatibility)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install MiroFish backend dependencies
        working-directory: MiroFish/backend
        run: uv sync

      - name: Write MiroFish .env
        working-directory: MiroFish
        run: |
          cat > .env << 'EOF'
          LLM_API_KEY=${{ secrets.QWEN_API_KEY }}
          LLM_BASE_URL=https://dashscope-intl.aliyuncs.com/compatible-mode/v1
          LLM_MODEL_NAME=qwen-plus
          ZEP_API_KEY=${{ secrets.ZEP_API_KEY }}
          EOF

      - name: Copy latest report as simulation seed
        run: |
          DATE=$(date +%Y-%m-%d)
          SIM_DIR="MiroFish/simulations/${DATE}-calgary-housing"
          mkdir -p "$SIM_DIR"
          cp reports/calgary_housing_report_*.md "$SIM_DIR/seed.md" 2>/dev/null || \
            cp $(ls reports/*.md | tail -1) "$SIM_DIR/seed.md"
          echo "SIM_DIR=${SIM_DIR}" >> $GITHUB_ENV

      - name: Start MiroFish backend
        working-directory: MiroFish/backend
        run: |
          nohup uv run python run.py > /tmp/mirofish.log 2>&1 &
          echo "MiroFish PID: $!"
          # Wait for it to come up
          for i in $(seq 1 20); do
            sleep 3
            curl -sf http://localhost:5001/health && echo "Backend up after ${i}x3s" && break
          done

      - name: Install pipeline script dependencies
        run: pip install requests

      - name: Run MiroFish pipeline
        working-directory: .
        env:
          PYTHONIOENCODING: utf-8
        run: python src/run_mirofish_pipeline.py

      - name: Translate report to English
        working-directory: .
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python src/translate_report.py

      - name: Commit simulation results to MiroFish repo
        working-directory: MiroFish
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add simulations/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Simulation run $(date +%Y-%m-%d)

          Automated biweekly Calgary Housing geopolitical simulation.
          Includes English translation (report_en.md).
          [skip ci]"
          git push origin main
